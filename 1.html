<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>

<body>
  <!-- GALLERY SECTION -->
<section id="gallery">
  <div class="container">
    
    <p class="section-eyebrow text-center">Memories</p>
    <h2 class="section-title text-center">
      A Life in <em>Pictures</em>
    </h2>
    <p class="section-sub text-center">
      Three decades of precious moments captured in time
    </p>
    
    <!-- FILTER BUTTONS -->
    <div class="gallery-tabs">
      <button class="gallery-tab active" data-cat="all">All</button>
      <button class="gallery-tab" data-cat="childhood">Childhood</button>
      <button class="gallery-tab" data-cat="recent">Recent</button>
      <button class="gallery-tab" data-cat="family">Family</button>
    </div>
    
    <!-- GALLERY GRID -->
    <div class="gallery-masonry" id="gallery-grid"></div>
    
    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox hidden">
      <button id="closeLightbox" class="close-btn">&times;</button>
      <img id="lightboxImg" src="" alt="Preview">
    </div>
    
  </div>
</section>

<style>
  .gallery-tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin: 30px 0;
  }
  
  .gallery-tab {
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: #f5d6c6;
    color: #6B2137;
    font-weight: 600;
    transition: .3s;
  }
  
  .gallery-tab.active {
    background: #D4AF37;
    color: #fff;
  }
  
  .gallery-masonry {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
  
  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    cursor: pointer;
  }
  
  .gallery-item img {
    width: 100%;
    height: 100%;
    display: block;
    transition: .5s;
  }
  
  .gallery-item:hover img {
    transform: scale(1.08);
  }
  
  .gallery-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, .55);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
    color: #fff;
    opacity: 0;
    transition: .3s;
  }
  
  .gallery-item:hover .gallery-overlay {
    opacity: 1;
  }
  
  .gallery-overlay-icons {
    display: flex;
    gap: 15px;
    margin-top: 10px;
  }
  
  .gallery-overlay-icons a {
    color: #D4AF37;
    font-size: 20px;
  }
  
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  
  .lightbox img {
    max-width: 90%;
    max-height: 90vh;
    border-radius: 12px;
  }
  
  .hidden {
    display: none;
  }
  
  .close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    background: none;
    border: none;
    color: #fff;
    font-size: 35px;
    cursor: pointer;
  }
  
  .gallery-blur .gallery-item {
    filter: blur(5px);
    opacity: .4;
    transition: .3s;
  }
  
  .gallery-blur .gallery-item.active {
    filter: none;
    opacity: 1;
  }
  
  @media(max-width:768px) {
    .gallery-masonry {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  
  @media(max-width:500px) {
    .gallery-masonry {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  const GALLERY_DATA = [
    { src: "ay.jpg", cat: "recent", caption: "Radiant & Thriving" },
    { src: "ay1.jpg", cat: "family", caption: "Family Moments" },
    { src: "ay2.jpg", cat: "recent", caption: "Friends Forever" },
    { src: "ay3.jpg", cat: "recent", caption: "Celebrating in Style" },
    { src: "ay4.jpg", cat: "recent", caption: "Family Reunion" },
    { src: "ay5.jpg", cat: "recent", caption: "Girls Night Out" },
    { src: "ay6.jpg", cat: "recent", caption: "Career Milestones" },
    { src: "ay7.jpg", cat: "recent", caption: "Team Achievement" },
    { src: "ay8.jpg", cat: "childhood", caption: "Childhood Memories" },
    { src: "ay9.jpg", cat: "recent", caption: "A Beautiful Soul" },
    { src: "ayy.jpg", cat: "recent", caption: "Laughter & Joy" },
    { src: "ayy1.jpg", cat: "childhood", caption: "Growing Up" },
    { src: "ayy2.jpg", cat: "recent", caption: "Together Always" },
    { src: "ayy3.jpg", cat: "recent", caption: "Glowing at 30" },
    { src: "ayy4.jpg", cat: "recent", caption: "Professional Pride" },
    { src: "ayy5.jpg", cat: "recent", caption: "Professional Pride" },
    { src: "ayy6.jpg", cat: "recent", caption: "Professional Pride" },
    { src: "ayy7.jpg", cat: "recent", caption: "Professional Pride" }
  ];
  
  const galleryGrid = document.getElementById("gallery-grid");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const closeBtn = document.getElementById("closeLightbox");
  
  function renderGallery(category = "all") {
    
    galleryGrid.innerHTML = "";
    
    const items =
      category === "all" ?
      GALLERY_DATA :
      GALLERY_DATA.filter(item => item.cat === category);
    
    items.forEach(item => {
      
      const card = document.createElement("div");
      card.className = "gallery-item";
      
      card.innerHTML = `
      <img src="${item.src}" alt="${item.caption}" loading="lazy">

      <div class="gallery-overlay">
        <p>${item.caption}</p>

        <div class="gallery-overlay-icons">

          <a href="${item.src}" download onclick="event.stopPropagation()">
            <i class="fa-solid fa-download"></i>
          </a>

          <a href="#" onclick="
            event.preventDefault();
            event.stopPropagation();

            if(navigator.share){
              navigator.share({
                title:'Gallery Image',
                text:'Check out this image',
                url:'${item.src}'
              });
            }
          ">
            <i class="fa-solid fa-share-nodes"></i>
          </a>

        </div>
      </div>
    `;
      
      card.addEventListener("click", () => {
        openLightbox(item.src, card);
      });
      
      galleryGrid.appendChild(card);
    });
  }
  
  function openLightbox(src, clickedCard) {
    
    lightboxImg.src = src;
    lightbox.classList.remove("hidden");
    
    galleryGrid.classList.add("gallery-blur");
    
    document.querySelectorAll(".gallery-item").forEach(item => {
      item.classList.remove("active");
    });
    
    clickedCard.classList.add("active");
  }
  
  function closeLightboxFunc() {
    
    lightbox.classList.add("hidden");
    galleryGrid.classList.remove("gallery-blur");
    
    document.querySelectorAll(".gallery-item").forEach(item => {
      item.classList.remove("active");
    });
  }
  
  closeBtn.addEventListener("click", closeLightboxFunc);
  
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      closeLightboxFunc();
    }
  });
  
  document.querySelectorAll(".gallery-tab").forEach(tab => {
    
    tab.addEventListener("click", () => {
      
      document.querySelectorAll(".gallery-tab").forEach(btn => {
        btn.classList.remove("active");
      });
      
      tab.classList.add("active");
      
      renderGallery(tab.dataset.cat);
    });
    
  });
  
  renderGallery();
</script>
</body>

</html>
